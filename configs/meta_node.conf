# MetaNode Configuration
# ======================

# Node identity (unique within the cluster)
meta.node_id=1
meta.listen_addr=0.0.0.0:8100
meta.data_dir=/var/lib/openfs/meta

# Raft peers (comma-separated, e.g. "host1:8100,host2:8100,host3:8100")
# For single-node mode, leave empty or set to self
meta.raft_peers=

# Logging
log_level=INFO