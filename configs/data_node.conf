# DataNode Configuration
# =====================

# Network
data.listen_addr=0.0.0.0:8200
data.meta_addr=127.0.0.1:8100

# Disk storage pool configuration
# Each disk_path is a file or raw device managed by OpenFS.
# For file-based disks (testing): data_dir/disk0.ofs
# For raw devices (production): /dev/nvme0n1, /dev/sdb, etc.
# Multiple disks can be listed separated by commas.
data.disk_paths=/var/lib/openfs/data/disk0.ofs

# Default disk size in bytes when formatting new file-based disks (16MB default for testing)
# For production, set to match the actual disk/device size or leave 0 for auto-detect
data.disk_size=0

# WAL blocks per disk (each block = 4KB, default 256 = 1MB)
data.wal_blocks=256

# Data directory (used as fallback when disk_paths is empty)
data.data_dir=/var/lib/openfs/data

# Logging
log_level=INFO