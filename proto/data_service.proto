syntax = "proto3";
package openfs;

import "common.proto";

// ============================================================
// DataService: Client <-> DataNode
// ============================================================
service DataService {
    rpc WriteBlock(WriteBlockReq)       returns (WriteBlockResp);
    rpc ReadBlock(ReadBlockReq)         returns (ReadBlockResp);
    rpc DeleteBlock(DeleteBlockReq)     returns (DeleteBlockResp);
}

message WriteBlockReq {
    uint64 block_id   = 1;
    uint64 segment_id = 2;
    uint32 crc32      = 3;
    bytes  data       = 4;
}
message WriteBlockResp {
    int32  status     = 1;
    uint64 segment_id = 2;
    uint64 offset     = 3;    // actual offset within segment
}

message ReadBlockReq {
    uint64 block_id   = 1;
    uint64 segment_id = 2;
    uint64 offset     = 3;
    uint32 size       = 4;
}
message ReadBlockResp {
    int32  status = 1;
    uint32 crc32  = 2;
    bytes  data   = 3;
}

message DeleteBlockReq {
    uint64 block_id = 1;
}
message DeleteBlockResp {
    int32 status = 1;
}